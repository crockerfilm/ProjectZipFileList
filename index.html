<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shot List</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #252525;
    --text: #e0e0e0;
    --dim: #666;
    --faint: #3a3a3a;
    --accent: #4a9eff;
    --green: #4aff8b;
    --warn: #ffb84a;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
  }

  #uploadView {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 520px;
    margin-top: 80px;
  }
  #uploadView h1 {
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }
  #uploadView .sub {
    font-size: 13px; color: var(--dim);
    margin-bottom: 32px;
  }

  .drop-zone {
    width: 100%;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(74,158,255,0.03);
  }
  .drop-zone p { font-size: 14px; color: var(--dim); }
  .drop-zone p strong { color: var(--accent); }
  .drop-zone input { display: none; }
  .upload-status {
    font-size: 12px; color: var(--dim);
    margin-top: 12px; min-height: 18px;
    text-align: center;
    max-width: 100%;
  }
  .upload-status.warn { color: var(--warn); }

  #resultsView {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 560px;
    gap: 0;
  }
  #resultsView.active { display: flex; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-bar-left {
    display: flex; align-items: center; gap: 8px;
  }
  .top-bar label {
    font-size: 13px; color: var(--dim); font-weight: 500;
  }
  .top-bar input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    width: 120px;
    outline: none;
  }
  .top-bar input:focus { border-color: var(--accent); }
  .top-bar input::placeholder { color: var(--faint); }
  .auto-badge {
    font-size: 10px; color: var(--green);
    background: rgba(74,255,139,0.08);
    padding: 2px 6px; border-radius: 3px;
    font-weight: 600;
  }
  .new-zip {
    font-size: 12px; color: var(--dim);
    cursor: pointer; text-decoration: underline;
    text-underline-offset: 3px;
  }
  .new-zip:hover { color: var(--text); }
  .top-bar-right {
    display: flex; align-items: center; gap: 14px;
  }
  .seq-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--dim);
    cursor: pointer; user-select: none;
  }
  .seq-toggle:hover { color: var(--text); }
  .seq-toggle input {
    appearance: none; -webkit-appearance: none;
    width: 30px; height: 17px; border-radius: 9px;
    background: #1e1e1e; border: 1px solid var(--border);
    position: relative; cursor: pointer; flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .seq-toggle input::after {
    content: ''; position: absolute;
    top: 1px; left: 1px; width: 13px; height: 13px;
    border-radius: 50%; background: var(--dim);
    transition: transform 0.15s, background 0.15s;
  }
  .seq-toggle input:checked {
    background: rgba(74,255,139,0.12); border-color: var(--green);
  }
  .seq-toggle input:checked::after {
    transform: translateX(13px); background: var(--green);
  }
  .file-info {
    font-size: 11px; color: var(--faint);
    margin-bottom: 16px;
  }

  .paste-section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
  }
  .paste-section.complete { border-color: var(--green); }

  .paste-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .paste-label {
    display: flex; align-items: center; gap: 8px;
  }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--faint);
    color: var(--bg);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .paste-section.complete .step-num { background: var(--green); }
  .paste-title {
    font-size: 13px; font-weight: 600; color: var(--dim);
  }
  .paste-section.complete .paste-title { color: var(--green); }

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    border: none; white-space: nowrap;
  }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-accent:hover { background: #5eadff; }
  .btn-accent:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-dim {
    background: #1e1e1e; color: var(--dim);
    border: 1px solid var(--border);
  }
  .btn-dim:hover { border-color: var(--accent); color: var(--text); }
  .btn-green { background: var(--green); color: #000; }

  .text-block {
    font-family: 'DM Mono', monospace;
    font-size: 12px; line-height: 1.75;
    white-space: pre-wrap; word-break: break-all;
    color: #aaa;
    max-height: 240px;
    overflow-y: auto;
    padding: 12px;
    background: var(--bg);
    border-radius: 6px;
  }

  .thumb-area { min-height: 60px; }

  .progress-row {
    display: flex; align-items: center; gap: 10px;
  }
  .progress-track {
    flex: 1; height: 4px;
    background: #1e1e1e; border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease-out;
  }
  .progress-fill.done { background: var(--green); }
  .progress-pct {
    font-size: 11px; color: var(--dim);
    width: 32px; text-align: right;
    font-family: 'DM Mono', monospace;
  }

  .thumb-preview { display: none; margin-top: 10px; }
  .thumb-preview.visible { display: block; }
  .thumb-img-wrap {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .thumb-img-wrap img {
    width: 100%; display: block;
    -webkit-user-drag: auto;
  }
  .drag-tag {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.75);
    color: #aaa;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    pointer-events: none;
  }
  .thumb-actions {
    display: flex; gap: 8px; margin-top: 8px;
    flex-wrap: wrap;
  }
  .warn-note {
    font-size: 11px;
    color: var(--warn);
    margin-top: 8px;
    display: none;
  }
  .warn-note.visible { display: block; }
</style>
</head>
<body>

<div id="uploadView">
  <h1>Shot List</h1>
  <p class="sub">Drop a project zip to generate a shot list for Slack</p>
  <div class="drop-zone" id="dropZone">
    <p><strong>Click or drag</strong> a .zip here</p>
    <input type="file" id="fileInput" accept=".zip">
  </div>
  <p class="upload-status" id="uploadStatus"></p>
</div>

<div id="resultsView">
  <div class="top-bar">
    <div class="top-bar-left">
      <label>Concept</label>
      <input type="text" id="conceptCode" placeholder="ABC123" oninput="onCodeEdit()">
      <span class="auto-badge" id="autoBadge" style="display:none">auto</span>
    </div>
    <div class="top-bar-right">
      <label class="seq-toggle" title="A numbered render/frame folder (comp_0001.exr … comp_0240.exr) gets listed as one line instead of every frame">
        <input type="checkbox" id="collapseSeqToggle" checked onchange="onCollapseToggle()">
        <span>List image sequences as one line</span>
      </label>
      <span class="new-zip" onclick="restart()">New zip</span>
    </div>
  </div>
  <p class="file-info" id="fileInfo"></p>

  <div class="paste-section" id="section1">
    <div class="paste-header">
      <div class="paste-label">
        <div class="step-num">1</div>
        <span class="paste-title">Copy text into Slack thread</span>
      </div>
      <button class="btn btn-accent" id="copyTextBtn" onclick="copyText()">Copy</button>
    </div>
    <div class="text-block" id="shotText"></div>
  </div>

  <div class="paste-section" id="section2">
    <div class="paste-header">
      <div class="paste-label">
        <div class="step-num">2</div>
        <span class="paste-title">Paste thumbnail into same thread</span>
      </div>
      <div class="thumb-actions" id="thumbActions" style="display:none">
        <button class="btn btn-accent" id="copyImgBtn" onclick="copyImage()">Copy image</button>
        <button class="btn btn-dim" onclick="downloadSheet()">Download</button>
      </div>
    </div>
    <div class="thumb-area">
      <div class="progress-row" id="progressRow">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="thumb-preview" id="thumbPreview">
        <div class="thumb-img-wrap">
          <img id="contactImg" alt="Contact sheet">
          <span class="drag-tag">drag into Slack</span>
        </div>
      </div>
    </div>
    <p class="warn-note" id="thumbWarn"></p>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════ */
const VIDEO_EXTS = new Set(['mp4','mov','avi','mkv','wmv','flv','webm','m4v','mpg','mpeg','mxf','r3d','braw','ari','prores','ts','mts','m2ts','3gp','ogv','divx','vob']);
const BROWSER_VIDEO_EXTS = new Set(['mp4','webm','m4v','ogg','ogv','mov']);
const AUDIO_EXTS = new Set(['wav','mp3','aac','aif','aiff','flac','ogg','m4a','wma','opus','ac3','dts']);
const IMAGE_EXTS = new Set(['jpg','jpeg','png','tif','tiff','psd','ai','eps','svg','gif','webp','bmp','raw','cr2','cr3','nef','dng','arw','orf','rw2','heic','heif','avif','exr','hdr']);
const BROWSER_IMAGE_EXTS = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','avif']);

const JUNK_FOLDERS = new Set([
  'auto-save','adobe premiere pro auto-save','previews','encoded',
  'media cache','media cache files','peak files','conformed audio',
  'proxy','proxies','.thumbnails','.cache','__macosx','.ds_store',
  'render files','transcoded media','optimized media','analysis files',
  '.braw_cache','cache','temp','tmp','.tmp','.temp',
  'after effects auto-save','ae auto-save','davinci resolve',
  '.resolve','optimizedmedia','cachefiles','.fseventsd',
  '.spotlight-v100','.trashes','.temporaryitems','node_modules',
  '.git','.svn','__pycache__','.metadata'
]);

const JUNK_FILE_RE = [
  /^\./, /^~/, /^thumbs\.db$/i, /^desktop\.ini$/i,
  /\.pkf$/i, /\.pek$/i, /\.cfa$/i, /\.tmp$/i,
  /\.lnk$/i, /\.bak$/i, /\.log$/i,
  /^\.ds_store$/i, /\.xmp$/i, /\.crdownload$/i, /\.part$/i
];

const CODE_RE = /([A-Z]{2,6})[-_.\s]?(\d{2,6})/;

const MAX_DECOMPRESS   = 120 * 1024 * 1024;  // 120 MB per-file thumb cap
const LARGE_ZIP_CUTOFF = 800 * 1024 * 1024;  // 800 MB — skip JSZip, use lightweight parser

/* Image-sequence collapsing.
   A group is treated as a sequence ONLY if every guard passes:
     - same folder, same prefix, same extension (images only)
     - >= SEQ_MIN_FRAMES members
     - trailing frame numbers packed into their range at >= SEQ_MIN_DENSITY
   The density guard is what keeps coincidentally-numbered deliverables
   (banner_300x250, ad_1080/ad_1920, logo_v1/v2, etc.) from collapsing —
   those are sparse and/or differently-prefixed, so they never qualify. */
const COLLAPSE_SEQ_DEFAULT = true;
const SEQ_MIN_FRAMES  = 10;   // need at least this many frames to count as a sequence
const SEQ_MIN_DENSITY = 0.5;  // >= half the numeric range must be present (tolerates dropped frames)

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let currentFiles     = [];
let currentZip       = null;  // JSZip instance (null for large zips)
let rawFile          = null;  // original File — kept for slice extraction
let contactSheetBlob = null;
let thumbReady       = false;
let gridGenId        = 0;
let textCopied       = false;
let usedLightweight  = false;
let collapseSequences = COLLAPSE_SEQ_DEFAULT;
let lastFileMeta     = null;  // { name, size } — kept so the summary can rebuild on toggle

/* ═══════════════════════════════════════════════
   DOM
   ═══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const $drop      = $('dropZone');
const $fileIn    = $('fileInput');
const $code      = $('conceptCode');
const $badge     = $('autoBadge');
const $text      = $('shotText');
const $copyText  = $('copyTextBtn');
const $copyImg   = $('copyImgBtn');
const $img       = $('contactImg');
const $fill      = $('progressFill');
const $pct       = $('progressPct');
const $progRow   = $('progressRow');
const $thumbPrev = $('thumbPreview');
const $thumbActs = $('thumbActions');
const $s1        = $('section1');
const $s2        = $('section2');
const $status    = $('uploadStatus');
const $thumbWarn = $('thumbWarn');

/* ═══════════════════════════════════════════════
   UPLOAD HANDLERS
   ═══════════════════════════════════════════════ */
$drop.addEventListener('click', () => $fileIn.click());
$drop.addEventListener('dragover', e => { e.preventDefault(); $drop.classList.add('dragover'); });
$drop.addEventListener('dragleave', () => $drop.classList.remove('dragover'));
$drop.addEventListener('drop', e => {
  e.preventDefault(); $drop.classList.remove('dragover');
  if (e.dataTransfer.files.length) processZip(e.dataTransfer.files[0]);
});
$fileIn.addEventListener('change', e => { if (e.target.files.length) processZip(e.target.files[0]); });

/* ═══════════════════════════════════════════════
   LIGHTWEIGHT CENTRAL DIRECTORY PARSER
   Reads ~65 KB from the tail of the file to find
   the End-of-Central-Directory record, then reads
   just the central directory bytes. Never touches
   file data. Works on any size zip.
   ═══════════════════════════════════════════════ */
function readSlice(file, start, len) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(new Uint8Array(r.result));
    r.onerror = () => reject(r.error);
    r.readAsArrayBuffer(file.slice(start, start + len));
  });
}
function u16(b, o) { return b[o] | (b[o+1] << 8); }
function u32(b, o) { return (b[o] | (b[o+1] << 8) | (b[o+2] << 16) | (b[o+3] << 24)) >>> 0; }
function u64(b, o) { return Number(u32(b, o)) + Number(u32(b, o+4)) * 0x100000000; }

async function parseCentralDirectory(file) {
  const tailSize = Math.min(65557, file.size);
  const tail = await readSlice(file, file.size - tailSize, tailSize);

  // Find EOCD signature (PK\x05\x06)
  let eocdOff = -1;
  for (let i = tail.length - 22; i >= 0; i--) {
    if (tail[i]===0x50 && tail[i+1]===0x4B && tail[i+2]===0x05 && tail[i+3]===0x06) { eocdOff = i; break; }
  }
  if (eocdOff === -1) throw new Error('Not a valid zip (no EOCD)');

  let entryCount = u16(tail, eocdOff + 10);
  let cdSize     = u32(tail, eocdOff + 12);
  let cdOffset   = u32(tail, eocdOff + 16);

  // Zip64 check
  if (cdOffset === 0xFFFFFFFF || cdSize === 0xFFFFFFFF || entryCount === 0xFFFF) {
    const absEocd = file.size - tailSize + eocdOff;
    if (absEocd >= 20) {
      const loc = await readSlice(file, absEocd - 20, 20);
      if (loc[0]===0x50 && loc[1]===0x4B && loc[2]===0x06 && loc[3]===0x07) {
        const z64off = u64(loc, 8);
        const z64 = await readSlice(file, z64off, 56);
        if (z64[0]===0x50 && z64[1]===0x4B && z64[2]===0x06 && z64[3]===0x06) {
          entryCount = u64(z64, 32);
          cdSize     = u64(z64, 40);
          cdOffset   = u64(z64, 48);
        }
      }
    }
  }

  // Read central directory
  const cd = await readSlice(file, cdOffset, cdSize);
  const entries = [];
  let p = 0;

  for (let n = 0; n < entryCount && p + 46 <= cd.length; n++) {
    if (cd[p]!==0x50 || cd[p+1]!==0x4B || cd[p+2]!==0x01 || cd[p+3]!==0x02) break;

    const compMethod  = u16(cd, p+10);
    const compSz      = u32(cd, p+20);
    const uncompSz    = u32(cd, p+24);
    const nameLen     = u16(cd, p+28);
    const extraLen    = u16(cd, p+30);
    const commentLen  = u16(cd, p+32);
    const localOff    = u32(cd, p+42);

    let path;
    try   { path = new TextDecoder('utf-8').decode(cd.slice(p+46, p+46+nameLen)); }
    catch { path = String.fromCharCode(...cd.slice(p+46, p+46+nameLen)); }

    const isDir = path.endsWith('/') || path.endsWith('\\');

    // Zip64 extra field
    let rUncomp = uncompSz, rComp = compSz, rOff = localOff;
    if (uncompSz===0xFFFFFFFF || compSz===0xFFFFFFFF || localOff===0xFFFFFFFF) {
      let ep = p + 46 + nameLen;
      const eEnd = ep + extraLen;
      while (ep + 4 <= eEnd) {
        const eid = u16(cd, ep), esz = u16(cd, ep+2);
        if (eid === 0x0001) {
          let fo = ep + 4;
          if (uncompSz===0xFFFFFFFF && fo+8<=eEnd) { rUncomp = u64(cd, fo); fo+=8; }
          if (compSz===0xFFFFFFFF   && fo+8<=eEnd) { rComp   = u64(cd, fo); fo+=8; }
          if (localOff===0xFFFFFFFF && fo+8<=eEnd) { rOff    = u64(cd, fo); }
          break;
        }
        ep += 4 + esz;
      }
    }

    if (!isDir) {
      entries.push({
        path,
        compressedSize: rComp,
        uncompressedSize: rUncomp,
        localHeaderOffset: rOff,
        compressionMethod: compMethod
      });
    }
    p += 46 + nameLen + extraLen + commentLen;
  }
  return entries;
}

/**
 * Extract a single file from the raw zip via File.slice().
 * Handles STORED (method 0) directly, DEFLATED (method 8) via DecompressionStream.
 */
async function extractFromRaw(file, entry) {
  if (entry.uncompressedSize > MAX_DECOMPRESS) return null;

  // Read local header to find data start
  const lh = await readSlice(file, entry.localHeaderOffset, 30);
  const lNameLen  = u16(lh, 26);
  const lExtraLen = u16(lh, 28);
  const dataStart = entry.localHeaderOffset + 30 + lNameLen + lExtraLen;

  if (entry.compressionMethod === 0) {
    // STORED — zero-copy slice
    return file.slice(dataStart, dataStart + entry.uncompressedSize);
  }

  if (entry.compressionMethod === 8 && typeof DecompressionStream !== 'undefined') {
    // DEFLATED — use browser's built-in decompressor
    try {
      const compBlob = file.slice(dataStart, dataStart + entry.compressedSize);
      const ds = new DecompressionStream('deflate-raw');
      const readable = compBlob.stream().pipeThrough(ds);
      const reader = readable.getReader();
      const chunks = [];
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
      }
      return new Blob(chunks);
    } catch (e) {
      console.warn('DecompressionStream failed:', e.message);
      return null;
    }
  }

  return null;
}


/* ═══════════════════════════════════════════════
   PATH HELPERS
   ═══════════════════════════════════════════════ */
function isJunkPath(pl) {
  const segs = pl.split('/').filter(Boolean);
  for (let i = 0; i < segs.length - 1; i++) {
    if (JUNK_FOLDERS.has(segs[i])) return true;
    if (segs[i].startsWith('.') && segs[i].length > 1) return true;
  }
  return false;
}
function isJunkFile(name) { return JUNK_FILE_RE.some(r => r.test(name)); }

function getCommonRoot(paths) {
  if (!paths.length) return '';
  const p0 = paths[0].split('/');
  let d = 0;
  for (let i = 0; i < p0.length - 1; i++) {
    const pfx = p0.slice(0, i+1).join('/') + '/';
    if (paths.every(p => p.startsWith(pfx))) d = i + 1; else break;
  }
  return d ? p0.slice(0, d).join('/') + '/' : '';
}


/* ═══════════════════════════════════════════════
   IMAGE SEQUENCE DETECTION
   ═══════════════════════════════════════════════ */
function dirOf(rel) {
  const i = rel.lastIndexOf('/');
  return i === -1 ? '' : rel.substring(0, i + 1);
}

/* Pull a trailing frame counter off a filename's stem.
   "comp_v2.0048.exr" -> { prefix:"comp_v2.", num:48, width:4 }
   Returns null when the name has no trailing digit run. */
function parseFrame(name) {
  const dot  = name.lastIndexOf('.');
  const stem = dot > 0 ? name.substring(0, dot) : name;
  const m = stem.match(/^(.*?)(\d+)$/);
  if (!m) return null;
  return { prefix: m[1], num: parseInt(m[2], 10), width: m[2].length };
}

/* Find genuine image sequences in a file list. Conservative by design:
   groups by folder + prefix + extension, then requires both a frame-count
   floor AND a packed numeric range. Sparse or thinly-numbered sets (size
   variants, version bumps, a handful of stills) never qualify. */
function detectSequences(files) {
  const groups = new Map();
  for (const f of files) {
    if (f.type !== 'image') continue;        // images only — never touch video/audio
    const fr = parseFrame(f.name);
    if (!fr) continue;
    const dir = dirOf(f.relativePath || f.path);
    const key = dir + '\u0000' + fr.prefix.toLowerCase() + '\u0000' + f.ext;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push({ file: f, frame: fr });
  }

  const sequences = [];
  for (const arr of groups.values()) {
    if (arr.length < SEQ_MIN_FRAMES) continue;            // too few to be a render
    const nums = arr.map(a => a.frame.num);
    const min = Math.min(...nums), max = Math.max(...nums);
    const span = max - min + 1;
    if (arr.length / span < SEQ_MIN_DENSITY) continue;    // sparse -> not a sequence
    arr.sort((a, b) => a.frame.num - b.frame.num);
    sequences.push({
      members: arr.map(a => a.file),
      rep: arr[Math.floor(arr.length / 2)].file,          // middle frame = better thumbnail
      count: arr.length,
      min, max,
      prefix: arr[0].frame.prefix,
      ext: arr[0].file.ext,
      width: arr[0].frame.width
    });
  }
  return sequences;
}

/* The list actually shown/counted. With collapsing on, each sequence's
   members are replaced by one representative entry; everything else passes
   through untouched. currentFiles always stays the full, real list. */
function getDisplayFiles() {
  if (!collapseSequences) return currentFiles;
  const seqs = detectSequences(currentFiles);
  if (!seqs.length) return currentFiles;

  const repToSeq  = new Map();
  const memberSet = new Set();
  for (const s of seqs) {
    repToSeq.set(s.rep, s);
    for (const m of s.members) memberSet.add(m);
  }

  const out = [];
  for (const f of currentFiles) {
    if (repToSeq.has(f)) {
      const s = repToSeq.get(f);
      const pad = n => String(n).padStart(s.width, '0');
      out.push({
        ...f,
        isSequence: true,
        seqCount: s.count,
        seqLabel: `${s.prefix}[${'#'.repeat(s.width)}].${s.ext}`,
        seqRange: `${pad(s.min)}\u2013${pad(s.max)}`
      });
    } else if (!memberSet.has(f)) {
      out.push(f);                                         // ordinary file
    }
    // non-rep sequence members are dropped from the display list
  }
  return out;
}

function sequenceCount() {
  return collapseSequences ? detectSequences(currentFiles).length : 0;
}


/* ═══════════════════════════════════════════════
   MAIN PROCESS
   ═══════════════════════════════════════════════ */
async function processZip(file) {
  if (!file.name.toLowerCase().endsWith('.zip')) {
    showStatus('Please select a .zip file.', true); return;
  }

  showStatus('Reading zip...');
  $drop.querySelector('p').innerHTML = 'Processing...';
  $thumbWarn.classList.remove('visible');
  rawFile = file;
  usedLightweight = false;
  currentZip = null;

  try {
    let entries; // [{path, uncompressedSize, compressedSize, compressionMethod, localHeaderOffset, _zipEntry?}]

    if (file.size > LARGE_ZIP_CUTOFF) {
      // ── LARGE ZIP: lightweight central-directory-only parse ──
      usedLightweight = true;
      showStatus(`Large zip (${(file.size/1048576).toFixed(0)} MB) — scanning directory...`);
      entries = await parseCentralDirectory(file);
    } else {
      // ── NORMAL ZIP: full JSZip parse ──
      try {
        const zip = await JSZip.loadAsync(file);
        currentZip = zip;
        entries = [];
        zip.forEach((path, e) => {
          if (!e.dir) entries.push({
            path,
            uncompressedSize: e._data ? (e._data.uncompressedSize || 0) : 0,
            compressedSize:   e._data ? (e._data.compressedSize || 0) : 0,
            compressionMethod: e._data ? (e._data.compressionMethod || 8) : 8,
            localHeaderOffset: 0,
            _zipEntry: e
          });
        });
      } catch (e) {
        // JSZip choked — fall back to lightweight parser
        console.warn('JSZip failed, falling back:', e.message);
        usedLightweight = true;
        currentZip = null;
        showStatus('Retrying with lightweight parser...');
        entries = await parseCentralDirectory(file);
      }
    }

    if (!entries || !entries.length) {
      showStatus('Zip appears empty — no files found.', true);
      resetDropZone(); return;
    }

    const allPaths = entries.map(e => e.path);
    const root = getCommonRoot(allPaths);

    const footage = [];
    let skipped = 0;

    for (const entry of entries) {
      const rel = root ? entry.path.substring(root.length) : entry.path;
      const pl = rel.toLowerCase();
      if (isJunkPath(pl)) { skipped++; continue; }

      const name = rel.split('/').pop();
      if (!name) { skipped++; continue; }
      if (isJunkFile(name)) { skipped++; continue; }

      const dot = name.lastIndexOf('.');
      const ext = dot > 0 ? name.substring(dot + 1).toLowerCase() : '';
      if (!ext) { skipped++; continue; }

      let type = null;
      if (VIDEO_EXTS.has(ext)) type = 'video';
      else if (AUDIO_EXTS.has(ext)) type = 'audio';
      else if (IMAGE_EXTS.has(ext)) type = 'image';
      if (!type) continue;

      footage.push({
        name, type, ext,
        path: entry.path,
        relativePath: rel,
        uncompressedSize: entry.uncompressedSize || 0,
        compressedSize: entry.compressedSize || 0,
        compressionMethod: entry.compressionMethod || 8,
        localHeaderOffset: entry.localHeaderOffset || 0,
        _zipEntry: entry._zipEntry || null
      });
    }

    footage.sort((a, b) => {
      const o = { video: 0, audio: 1, image: 2 };
      return o[a.type] - o[b.type] || a.name.localeCompare(b.name);
    });

    // Dedup by lowercase name
    const seen = new Set();
    currentFiles = [];
    for (const f of footage) {
      const k = f.name.toLowerCase();
      if (!seen.has(k)) { seen.add(k); currentFiles.push(f); }
    }

    if (!currentFiles.length) {
      showStatus(`No media files found (${entries.length} scanned, ${skipped} filtered).`, true);
      resetDropZone(); return;
    }

    // Detect concept code
    const code = detectCode(file.name, allPaths, currentFiles);
    $code.value = code;
    $badge.style.display = code ? 'inline' : 'none';

    // Summary
    lastFileMeta = { name: file.name, size: file.size };
    updateSummary();

    // Reset UI state
    textCopied = false; thumbReady = false; contactSheetBlob = null;
    $s1.classList.remove('complete');
    $s2.classList.remove('complete');
    $s2.style.display = '';
    $copyText.className = 'btn btn-accent';
    $copyText.textContent = 'Copy';
    $thumbActs.style.display = 'none';
    $thumbPrev.classList.remove('visible');
    $progRow.style.display = 'flex';
    $fill.style.width = '0%';
    $fill.classList.remove('done');

    updateText();
    $('uploadView').style.display = 'none';
    $('resultsView').classList.add('active');
    generateGrid();

  } catch (err) {
    console.error('Zip error:', err);
    let msg = 'Error reading zip.';
    if (err.message) {
      if (/not a valid zip|no EOCD/i.test(err.message)) msg = 'Not a valid zip file.';
      else if (/memory|alloc/i.test(err.message)) msg = 'Out of memory — try closing other tabs.';
      else msg = 'Error: ' + err.message.substring(0, 120);
    }
    showStatus(msg, true);
    resetDropZone();
  }
}

function showStatus(msg, warn) {
  $status.textContent = msg;
  $status.classList.toggle('warn', !!warn);
}
function resetDropZone() {
  $drop.querySelector('p').innerHTML = '<strong>Click or drag</strong> a .zip here';
}

function detectCode(zipName, allPaths, files) {
  let m = zipName.toUpperCase().match(CODE_RE);
  if (m) return m[1] + m[2];
  const tops = new Set();
  for (const p of allPaths) { const s = p.split('/'); if (s.length > 1 && s[0]) tops.add(s[0]); }
  for (const f of tops) { m = f.toUpperCase().match(CODE_RE); if (m) return m[1] + m[2]; }
  for (const f of files) { m = f.name.toUpperCase().match(CODE_RE); if (m) return m[1] + m[2]; }
  for (const f of files) {
    for (const seg of f.relativePath.split('/').slice(0, -1)) {
      m = seg.toUpperCase().match(CODE_RE); if (m) return m[1] + m[2];
    }
  }
  return '';
}


/* ═══════════════════════════════════════════════
   TEXT
   ═══════════════════════════════════════════════ */
function onCodeEdit() { $badge.style.display = 'none'; updateText(); }

function updateSummary() {
  if (!lastFileMeta) return;
  const files = getDisplayFiles();
  const vc = files.filter(f => f.type === 'video').length;
  const ac = files.filter(f => f.type === 'audio').length;
  const ic = files.filter(f => f.type === 'image').length;
  const bits = [];
  if (vc) bits.push(vc + ' video');
  if (ac) bits.push(ac + ' audio');
  if (ic) bits.push(ic + ' image');
  const seqN = sequenceCount();
  if (seqN) bits.push(`${seqN} sequence${seqN > 1 ? 's' : ''} collapsed`);
  $('fileInfo').textContent =
    `${lastFileMeta.name} \u00B7 ${(lastFileMeta.size/1048576).toFixed(0)} MB \u00B7 ${bits.join(', ')}`;
}

function onCollapseToggle() {
  collapseSequences = $('collapseSeqToggle').checked;
  refreshDisplay();
}

/* Rebuild text + summary + contact sheet after the toggle flips. */
function refreshDisplay() {
  updateSummary();
  updateText();
  thumbReady = false; contactSheetBlob = null;
  $s2.classList.remove('complete');
  $thumbActs.style.display = 'none';
  $thumbPrev.classList.remove('visible');
  $thumbWarn.classList.remove('visible');
  $progRow.style.display = 'flex';
  $fill.style.width = '0%'; $fill.classList.remove('done');
  generateGrid();
}

function updateText() {
  const code = $code.value.trim();
  const files  = getDisplayFiles();
  const video  = files.filter(f => f.type === 'video');
  const audio  = files.filter(f => f.type === 'audio');
  const images = files.filter(f => f.type === 'image');

  let out = `Files Selected | ${code || '[Concept Name]'}`;
  if (video.length)  { out += '\n\nVideo Files:';  video.forEach(f  => out += `\n\u2022 ${f.name}`); }
  if (audio.length)  { out += '\n\nAudio Files:';  audio.forEach(f  => out += `\n\u2022 ${f.name}`); }
  if (images.length) {
    out += '\n\nImage Files:';
    images.forEach(f => {
      out += f.isSequence
        ? `\n\u2022 ${f.seqLabel} \u00B7 ${f.seqCount} frames (${f.seqRange})`
        : `\n\u2022 ${f.name}`;
    });
  }
  if (video.length || images.length) out += '\n\nThumbnail';

  $text.textContent = out;
  if (textCopied) {
    textCopied = false;
    $s1.classList.remove('complete');
    $copyText.className = 'btn btn-accent';
    $copyText.textContent = 'Copy';
  }
}

function copyText() {
  navigator.clipboard.writeText($text.textContent).then(() => {
    textCopied = true;
    $s1.classList.add('complete');
    $copyText.className = 'btn btn-green';
    $copyText.textContent = '\u2713 Copied';
    setTimeout(() => { $copyText.className = 'btn btn-dim'; $copyText.textContent = 'Copy again'; }, 2500);
  });
}


/* ═══════════════════════════════════════════════
   THUMBNAIL HELPERS
   ═══════════════════════════════════════════════ */
function setProgress(pct) {
  $fill.style.width = pct + '%';
  $fill.classList.toggle('done', pct >= 100);
  $pct.textContent = Math.round(pct) + '%';
}

function thumbFromVideo(blob) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(blob);
    const v = document.createElement('video');
    v.muted = true; v.preload = 'auto'; v.playsInline = true;
    const timeout = Math.max(10000, Math.min(30000, blob.size / 100000));
    const t = setTimeout(() => { cleanup(); resolve(null); }, timeout);

    function cleanup() {
      clearTimeout(t);
      URL.revokeObjectURL(url);
      try { v.removeAttribute('src'); v.load(); } catch(e){}
    }
    v.addEventListener('seeked', () => {
      try {
        const c = document.createElement('canvas');
        c.width = v.videoWidth || 320; c.height = v.videoHeight || 180;
        c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
        cleanup(); resolve(c);
      } catch(e) { cleanup(); resolve(null); }
    }, { once: true });
    v.addEventListener('loadedmetadata', () => {
      try { v.currentTime = Math.min(1, v.duration * 0.1); }
      catch(e) { cleanup(); resolve(null); }
    }, { once: true });
    v.addEventListener('error', () => { cleanup(); resolve(null); }, { once: true });
    v.src = url;
  });
}

function thumbFromImage(blob) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    const t = setTimeout(() => { URL.revokeObjectURL(url); resolve(null); }, 15000);
    img.onload = () => {
      clearTimeout(t);
      try {
        const c = document.createElement('canvas');
        const max = 3840;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > max || h > max) { const s = max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url); resolve(c);
      } catch(e) { URL.revokeObjectURL(url); resolve(null); }
    };
    img.onerror = () => { clearTimeout(t); URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

function placeholder(type, ext, reason) {
  const c = document.createElement('canvas');
  c.width = 320; c.height = 180;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, 320, 180);
  ctx.fillStyle = '#555'; ctx.font = '600 13px DM Sans, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let label = type === 'audio' ? '\u266A ' + ext.toUpperCase() : ext.toUpperCase();
  if (reason === 'too-large')   label += ' \u2022 too large for preview';
  if (reason === 'unsupported') label += ' \u2022 no browser preview';
  if (reason === 'extract-fail') label += ' \u2022 compressed';
  ctx.fillText(label, 160, 90);
  return c;
}

const VMIME = { mp4:'video/mp4', webm:'video/webm', m4v:'video/mp4', ogg:'video/ogg', ogv:'video/ogg', mov:'video/quicktime' };
const IMIME = { png:'image/png', gif:'image/gif', webp:'image/webp', bmp:'image/bmp', svg:'image/svg+xml', avif:'image/avif', jpg:'image/jpeg', jpeg:'image/jpeg' };

/**
 * Get blob for a file — JSZip path or raw-slice path
 */
async function getBlob(f) {
  // JSZip path
  if (currentZip) {
    // Direct lookup
    let entry = currentZip.file(f.path);
    if (!entry) {
      // Fuzzy: case-insensitive
      const norm = f.path.toLowerCase().replace(/\\/g, '/');
      currentZip.forEach((p, e) => {
        if (!entry && !e.dir && p.toLowerCase().replace(/\\/g, '/') === norm) entry = e;
      });
    }
    if (!entry) {
      // Fuzzy: filename only
      const target = f.name.toLowerCase();
      currentZip.forEach((p, e) => {
        if (!entry && !e.dir && p.split('/').pop().toLowerCase() === target) entry = e;
      });
    }
    if (entry) return await entry.async('blob');
  }

  // Raw extraction path (large zips)
  if (rawFile) return await extractFromRaw(rawFile, f);
  return null;
}


/* ═══════════════════════════════════════════════
   GRID GENERATION
   ═══════════════════════════════════════════════ */
async function generateGrid() {
  const vis = getDisplayFiles().filter(f => f.type === 'video' || f.type === 'image');
  if (!vis.length) {
    thumbReady = true;
    $progRow.style.display = 'none';
    $s2.style.display = 'none';
    return;
  }

  const id = ++gridGenId;
  setProgress(0);
  let skippedCount = 0;

  const TW = 320, TH = 180, PAD = 16, LH = 28, HH = 56;
  const COLS = Math.min(4, vis.length);
  const ROWS = Math.ceil(vis.length / COLS);
  const W = PAD + COLS * (TW + PAD);
  const H = HH + PAD + ROWS * (TH + LH + PAD);

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  const code = $code.value.trim() || '...';
  ctx.fillStyle = '#e0e0e0'; ctx.font = '600 18px DM Sans, sans-serif'; ctx.textBaseline = 'top';
  ctx.fillText(`Contact Sheet: ${code}`, PAD, PAD);
  ctx.fillStyle = '#555'; ctx.font = '400 12px DM Sans, sans-serif';
  ctx.fillText(`${vis.length} files`, PAD, PAD + 26);

  for (let i = 0; i < vis.length; i++) {
    if (id !== gridGenId) return;
    const f = vis[i];
    setProgress(((i + 1) / vis.length) * 95);

    let thumb = null;
    let reason = '';

    try {
      // Gate 1: size check
      if (f.uncompressedSize > MAX_DECOMPRESS) {
        reason = 'too-large'; skippedCount++;
      }
      // Gate 2: browser-renderable?
      else if (f.type === 'video' && !BROWSER_VIDEO_EXTS.has(f.ext)) {
        reason = 'unsupported'; skippedCount++;
      }
      else if (f.type === 'image' && !BROWSER_IMAGE_EXTS.has(f.ext)) {
        reason = 'unsupported'; skippedCount++;
      }
      else {
        const blob = await getBlob(f);
        if (blob && blob.size > 0) {
          if (f.type === 'video') {
            const mime = VMIME[f.ext] || 'video/mp4';
            thumb = await thumbFromVideo(new Blob([blob], { type: mime }));
          } else {
            const mime = IMIME[f.ext] || 'image/jpeg';
            thumb = await thumbFromImage(new Blob([blob], { type: mime }));
          }
        }
        if (!thumb) { reason = 'extract-fail'; skippedCount++; }
      }
    } catch (e) {
      console.warn(`Thumb error [${f.name}]:`, e.message || e);
      reason = 'extract-fail'; skippedCount++;
    }

    if (!thumb) thumb = placeholder(f.type, f.ext, reason);

    // Draw tile
    const col = i % COLS, row = Math.floor(i / COLS);
    const x = PAD + col * (TW + PAD);
    const y = HH + PAD + row * (TH + LH + PAD);

    const sr = thumb.width / thumb.height, dr = TW / TH;
    let sw, sh, sx, sy;
    if (sr > dr) { sh = thumb.height; sw = sh * dr; sx = (thumb.width - sw) / 2; sy = 0; }
    else { sw = thumb.width; sh = sw / dr; sx = 0; sy = (thumb.height - sh) / 2; }

    const r = 4;
    ctx.save(); ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+TW-r,y);
    ctx.quadraticCurveTo(x+TW,y,x+TW,y+r);
    ctx.lineTo(x+TW,y+TH-r);
    ctx.quadraticCurveTo(x+TW,y+TH,x+TW-r,y+TH);
    ctx.lineTo(x+r,y+TH);
    ctx.quadraticCurveTo(x,y+TH,x,y+TH-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath(); ctx.clip();
    ctx.drawImage(thumb, sx, sy, sw, sh, x, y, TW, TH);
    ctx.restore();

    ctx.fillStyle = '#aaa'; ctx.font = '400 11px DM Mono, monospace';
    ctx.textBaseline = 'top'; ctx.textAlign = 'left';
    let label = f.isSequence ? `${f.seqLabel} \u00D7${f.seqCount}` : f.name;
    if (ctx.measureText(label).width > TW) {
      while (ctx.measureText(label + '...').width > TW && label.length > 4) label = label.slice(0, -1);
      label += '...';
    }
    ctx.fillText(label, x, y + TH + 6);

    // Yield to UI
    if (i < vis.length - 1) await new Promise(r => setTimeout(r, 10));
  }

  if (id !== gridGenId) return;
  setProgress(100);

  if (skippedCount > 0) {
    $thumbWarn.textContent = `${skippedCount} file${skippedCount > 1 ? 's' : ''} shown as placeholders (too large, unsupported codec, or compressed).`;
    $thumbWarn.classList.add('visible');
  }

  canvas.toBlob(blob => {
    if (id !== gridGenId) return;
    contactSheetBlob = blob;
    thumbReady = true;
    $img.src = URL.createObjectURL(blob);
    $progRow.style.display = 'none';
    $thumbPrev.classList.add('visible');
    $thumbActs.style.display = 'flex';
  }, 'image/png');
}


/* ═══════════════════════════════════════════════
   IMAGE ACTIONS
   ═══════════════════════════════════════════════ */
async function copyImage() {
  if (!contactSheetBlob) return;
  try {
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': contactSheetBlob })]);
    $s2.classList.add('complete');
    $copyImg.className = 'btn btn-green';
    $copyImg.textContent = '\u2713 Copied';
    setTimeout(() => { $copyImg.className = 'btn btn-accent'; $copyImg.textContent = 'Copy image'; }, 2500);
  } catch (e) {
    downloadSheet();
    $copyImg.textContent = 'Downloaded';
    setTimeout(() => { $copyImg.textContent = 'Copy image'; }, 2000);
  }
}

function downloadSheet() {
  if (!contactSheetBlob) return;
  const code = $code.value.trim() || 'sheet';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(contactSheetBlob);
  a.download = `contact-sheet_${code}.png`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function restart() {
  currentFiles = []; currentZip = null; rawFile = null;
  contactSheetBlob = null; thumbReady = false;
  textCopied = false; gridGenId++; usedLightweight = false;
  collapseSequences = COLLAPSE_SEQ_DEFAULT; lastFileMeta = null;
  $('collapseSeqToggle').checked = COLLAPSE_SEQ_DEFAULT;
  $fileIn.value = ''; $code.value = '';
  $badge.style.display = 'none';
  $thumbWarn.classList.remove('visible');
  $status.classList.remove('warn');
  $('uploadView').style.display = 'flex';
  $('resultsView').classList.remove('active');
  $drop.querySelector('p').innerHTML = '<strong>Click or drag</strong> a .zip here';
  $status.textContent = '';
}
